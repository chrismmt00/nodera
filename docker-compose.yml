services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nodera
      POSTGRES_PASSWORD: nodera
      POSTGRES_DB: nodera
    ports:
      - "5432:5432"
    volumes:
      - nodera_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodera -d nodera"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  nodera_postgres_data:
